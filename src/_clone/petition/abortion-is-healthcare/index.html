  :root {

<script>
  // Store references to event handlers (reuse across script executions)
  window.movementHandlers = window.movementHandlers || new WeakMap();

  document.addEventListener('emailToTargetStepChange', (event) => {
    const stepNumber = event.detail.step

    const ettImageSide = document.querySelector('.image-side')

    if (ettImageSide) {
      ettImageSide.style.display = stepNumber !== 0 ? 'none' : 'block';
    }
  })

  document.addEventListener('movementPageLoaded', (event) => {
    window.scrollTo(0, 0);

    const cta = document.querySelector('.cta');
    if (!cta) return;

    const box = cta.querySelector('.box');
    const ctaHeader = box.querySelector('.cta-header');
    const smallText = box.querySelector('.small-text');
    const body = document.querySelector('body');

    function handleMediaQueryChange(e) {
      if (e.matches) {
        const openSurveyFormButton = box.querySelector('.open-survey-form');
        if(!openSurveyFormButton) return;
        const closeSurveyForm = document.getElementById('closeSurveyForm');
        const surveyForm = document.querySelector('surveyform');

        if (closeSurveyForm) {
          // Remove old handler if it exists
          const oldCloseHandler = window.movementHandlers.get(closeSurveyForm);
          if (oldCloseHandler) {
            closeSurveyForm.removeEventListener('click', oldCloseHandler);
          }

          // Create and store new handler
          const closeHandler = () => {
            cta.classList.remove('active');
            openSurveyFormButton.style.display = 'block';
            surveyForm.style.display = 'none';
            if (ctaHeader) ctaHeader.style.display = 'none';
            closeSurveyForm.style.display = 'none';
            if (smallText) smallText.style.display = 'none';
            body.style.overflow = 'auto';
          };
          window.movementHandlers.set(closeSurveyForm, closeHandler);
          closeSurveyForm.addEventListener('click', closeHandler);
        }

        openSurveyFormButton.style.display = 'block';

        // Remove old handler if it exists
        const oldOpenHandler = window.movementHandlers.get(openSurveyFormButton);
        if (oldOpenHandler) {
          openSurveyFormButton.removeEventListener('click', oldOpenHandler);
        }

        // Create and store new handler
        const openHandler = () => {
          cta.classList.add('active');
          openSurveyFormButton.style.display = 'none';
          surveyForm.style.display = 'block';
          if (ctaHeader) ctaHeader.style.display = 'flex';
          closeSurveyForm.style.display = 'block';
          if (smallText) smallText.style.display = 'block';
          body.style.overflow = 'hidden';
        };
        window.movementHandlers.set(openSurveyFormButton, openHandler);
        openSurveyFormButton.addEventListener('click', openHandler);

        if (cta && cta.classList.contains('active')) {
          openSurveyFormButton.style.display = 'none';
          if (closeSurveyForm) closeSurveyForm.style.display = 'block';
          if (closeSurveyForm) surveyForm.style.display = 'block';
          if (ctaHeader) ctaHeader.style.display = 'flex';
          if (smallText) smallText.style.display = 'block';
          body.style.overflow = 'hidden';
        } else {
          openSurveyFormButton.style.display = 'block';
          if (closeSurveyForm) closeSurveyForm.style.display = 'none';
          if (closeSurveyForm) surveyForm.style.display = 'none';
          if (ctaHeader) ctaHeader.style.display = 'none';
          if (smallText) smallText.style.display = 'none';
          body.style.overflow = 'auto';
        }

        box.appendChild(openSurveyFormButton);

        const petitionSigned = document.getElementById('petition-signed');
        if (petitionSigned) {
          body.style.overflow = 'auto';
        }
      } else {
        const openSurveyFormButton = box.querySelector('.open-survey-form');
        if (openSurveyFormButton) {
          openSurveyFormButton.style.display = 'none';
        }

        const surveyForm = document.querySelector('surveyform');
        if (surveyForm) {
          surveyForm.style.display = 'block';
        }

        const ctaHeader = box.querySelector('.cta-header');
        if (ctaHeader) {
          ctaHeader.style.display = 'none';
        }

        const closeSurveyForm = document.getElementById('closeSurveyForm');
        if (closeSurveyForm) {
          closeSurveyForm.style.display = 'none';
        }

        if (smallText) smallText.style.display = 'block';
        body.style.overflow = 'auto';
      }
    }

    // Set up media query
    const mediaQuery = window.matchMedia('(max-width: 895px)');

    // Remove old handler if it exists
    const oldMediaHandler = window.movementHandlers.get(mediaQuery);
    if (oldMediaHandler) {
      mediaQuery.removeEventListener('change', oldMediaHandler);
    }

    // Store and add new handler
    window.movementHandlers.set(mediaQuery, handleMediaQueryChange);
    mediaQuery.addEventListener('change', handleMediaQueryChange);

    // Initial check
    handleMediaQueryChange(mediaQuery);

    const submitButton = document.querySelector('.submit-button');
    if (submitButton) {
      // Remove old handler if it exists
      const oldSubmitHandler = window.movementHandlers.get(submitButton);
      if (oldSubmitHandler) {
        submitButton.removeEventListener('click', oldSubmitHandler);
      }

      // Create and store new handler
      const submitHandler = () => {
        body.style.overflow = 'auto';
      };
      window.movementHandlers.set(submitButton, submitHandler);
      submitButton.addEventListener('click', submitHandler);
    }
  });
</script>
